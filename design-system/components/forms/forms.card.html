<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--color-ink); }
  .wrap { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; max-width: 460px; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-faint); }
  .field { display: flex; flex-direction: column; gap: 5px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, CopyField, Seg } = window.OtoConsoleDesignSystem_517927;
  function Demo() {
    const [mode, setMode] = React.useState("status");
    return (
      <div className="wrap">
        <div className="field"><span className="lbl">text input</span><Input placeholder="prospection marseille" /></div>
        <div className="field"><span className="lbl">mono input</span><Input mono placeholder="sk-serper-••••••••" /></div>
        <div className="field"><span className="lbl">copy field</span><CopyField value="https://mcp.oto.cx/sse" /></div>
        <div className="field"><span className="lbl">segmented control</span><div><Seg options={["status","activity"]} value={mode} onChange={setMode} /></div></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>

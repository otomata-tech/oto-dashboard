<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css" />
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--color-ink); }
  .wrap { padding: 20px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .toggles { display: flex; flex-direction: column; gap: 11px; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-faint); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const NS = window.OtoConsoleDesignSystem_517927;
  const { Field, Input, Select, Checkbox, Radio, Switch, Dropzone } = NS;
  function Demo() {
    const [ck, setCk] = React.useState(true);
    const [rd, setRd] = React.useState("org");
    const [vis, setVis] = React.useState("org");
    const [sw, setSw] = React.useState(true);
    return (
      <div className="wrap">
        <div className="stack">
          <Field label="nom du projet" hint="un but + ses entités.">
            <Input placeholder="Prospection Marseille" />
          </Field>
          <Field label="visibilité">
            <Select value={vis} onChange={setVis} options={[{value:"org",label:"organisation"},{value:"perso",label:"personnel"},{value:"equipe",label:"équipe"}]} />
          </Field>
          <Dropzone label="glissez un logo" hint="png ou svg · 2 Mo max" />
        </div>
        <div className="stack">
          <div className="toggles">
            <span className="lbl">checkbox</span>
            <Checkbox checked={ck} onChange={()=>setCk(!ck)} label="partager les clés de l'org" />
            <Checkbox checked={false} onChange={()=>{}} label="notifier l'équipe" />
          </div>
          <div className="toggles">
            <span className="lbl">radio</span>
            <Radio name="own" value="org" checked={rd==="org"} onChange={()=>setRd("org")} label="organisation" />
            <Radio name="own" value="perso" checked={rd==="perso"} onChange={()=>setRd("perso")} label="personnel" />
          </div>
          <div className="toggles">
            <span className="lbl">switch</span>
            <Switch checked={sw} onChange={()=>setSw(!sw)} label="mode dense" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

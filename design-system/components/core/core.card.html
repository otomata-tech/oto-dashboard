<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--color-ink); }
  .wrap { padding: 18px 22px; display: flex; flex-direction: column; gap: 15px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-faint); width: 100%; }
  .icons { display: flex; gap: 13px; flex-wrap: wrap; color: var(--color-ink-soft); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Icon, Kbd } = window.OtoConsoleDesignSystem_517927;
  const some = ["overview","connectors","procedures","data","documents","org","users","activity","key","shield","search","mail","settings","sparkles","bot","download"];
  function Demo() {
    return (
      <div className="wrap">
        <div className="row">
          <span className="lbl">buttons — all pill</span>
          <Button>Se connecter</Button>
          <Button kind="ghost">Annuler</Button>
          <Button kind="accent" icon="plus">Ajouter une clé</Button>
          <Button kind="mini" icon="plus">Nouveau</Button>
          <Button kind="danger" icon="trash-2">Révoquer</Button>
          <Button kind="link">Monitoring →</Button>
        </div>
        <div className="row">
          <span className="lbl">icon buttons</span>
          <IconButton icon="refresh-cw" label="refresh" />
          <IconButton icon="ellipsis" label="more" />
          <IconButton icon="x" label="close" />
          <IconButton icon="settings" variant="surface" label="settings" />
        </div>
        <div className="row">
          <span className="lbl">icons · lucide</span>
          <div className="icons">{some.map(n => <Icon key={n} name={n} size={20} />)}</div>
        </div>
        <div className="row">
          <span className="lbl">keys</span>
          <span style={{fontSize:13, color:"var(--color-mute)"}}><Kbd>⌘</Kbd> <Kbd>K</Kbd> to search · <Kbd>esc</Kbd> to close</span>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>

<script type="text/babel">
  const { Card, Textarea, Tag, Button, Alert } = window.OtoConsoleDesignSystem_517927;
  const DOC = "# Contexte\n\nOto automatise la prospection B2B pour les PME industrielles.\nCible : dirigeants, 10–250 salariés, France.\n\n## Règles CRM\n- Toujours vérifier le SIREN avant d'écrire dans Pipedrive.\n- Ne jamais contacter deux fois la même entreprise en 30 jours.\n\n## Ton\n- Direct, tutoiement, pas de jargon.";

    return (
      <Frame title="procédures" crumb="workspace" active="/procedures">
        <Alert tone="info" title="readme de l'agent">injecté au début de chaque session : contexte métier, règles CRM, ton, garde-fous.</Alert>
        <Card title="doctrine" sub="markdown — lu par vos agents à chaque session." actions={<><Button kind="ghost">Prévisualiser</Button><Button kind="accent">Publier</Button></>}>

        <Card title="outils référencés" sub="détectés dans la doctrine ci-dessus.">
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <Tag tone="cobalt">recherche_entreprises.search</Tag>
            <Tag tone="cobalt">pipedrive.upsert</Tag>
            <Tag tone="cobalt">gmail.send</Tag>
            <Tag tone="cobalt">sheets.append</Tag>
          </div>
        </Card>
      </Frame>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Page />);

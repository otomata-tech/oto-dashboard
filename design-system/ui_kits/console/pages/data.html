<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
<link rel="stylesheet" href="../../../styles.css" />
<script src="../../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>html, body { margin: 0; height: 100%; background: var(--color-bg); } #root { height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="frame.jsx"></script>
<script type="text/babel">
  const { Card, Table, Input, SearchableSelect, Pagination, Tag, Dot, Button, Icon } = window.OtoConsoleDesignSystem_517927;
  const rows = [
    { name: "Otomata SAS", siren: "902 431 187", city: "Marseille", tone: "olive", st: "actif" },
    { name: "Movinmotion", siren: "814 220 902", city: "Paris", tone: "olive", st: "actif" },
    { name: "Générations Renouvelables", siren: "789 552 013", city: "Lyon", tone: "saffron", st: "à vérifier" },
    { name: "Agriwatt", siren: "521 908 774", city: "Nantes", tone: "olive", st: "actif" },
    { name: "Hey Madeleine", siren: "913 004 226", city: "Bordeaux", tone: "terra", st: "radié" },
  ];
  const cols = [
    { key: "d", label: "", width: 20, render: (r) => <Dot tone={r.tone} size={7} /> },
    { key: "name", label: "entreprise", render: (r) => <span style={{ fontWeight: 600, color: "var(--color-ink)" }}>{r.name}</span> },
    { key: "siren", label: "siren", mono: true },
    { key: "city", label: "ville", render: (r) => <span style={{ color: "var(--color-mute)" }}>{r.city}</span> },
    { key: "st", label: "statut", align: "right", render: (r) => <Tag tone={r.tone}>{r.st}</Tag> },
  ];
  function Page() {
    const [p, setP] = React.useState(1);
    return (
      <Frame title="données" crumb="memory" active="/data">
        <Card sub="datastore natif — stockage tabulaire lisible par vos agents.">
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <div style={{ flex: 1, position: "relative", display: "flex", alignItems: "center" }}>
              <span style={{ position: "absolute", left: 11, color: "var(--color-faint)", display: "inline-flex" }}><Icon name="search" size={15} /></span>
              <Input placeholder="rechercher une entreprise…" style={{ paddingLeft: 33 }} />
            </div>
            <SearchableSelect width={190} options={["toutes","entreprises","contacts","deals"]} placeholder="Table" />
            <Button kind="accent" icon="plus">Nouvelle ligne</Button>
          </div>
        </Card>
        <Card title="entreprises" sub="128 lignes" flush>
          <Table columns={cols} rows={rows} />
        </Card>
        <div style={{ display: "flex", justifyContent: "flex-end" }}>
          <Pagination page={p} total={9} onChange={setP} />
        </div>
      </Frame>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>
<script type="text/babel" src="frame.jsx"></script>
<script type="text/babel">
  const { Card, Field, Input, Switch, Select, Button } = window.OtoConsoleDesignSystem_517927;
  function Page() {
    const [dense, setDense] = React.useState(true);
    const [lang, setLang] = React.useState("fr");
    return (
      <Frame title="paramètres" crumb="compte" active="/overview" narrow>
        <Card title="profil" sub="vos informations de compte.">
          <div style={{ display: "flex", flexDirection: "column", gap: 13 }}>
            <Field label="nom"><Input defaultValue="Jean-Baptiste" /></Field>
            <Field label="email"><Input defaultValue="jb@oto.ninja" /></Field>
            <div><Button kind="accent">Enregistrer</Button></div>
          </div>
        </Card>
        <Card title="préférences">
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Field label="langue"><Select value={lang} onChange={setLang} options={[{value:"fr",label:"Français"},{value:"en",label:"English"}]} /></Field>
            <Switch checked={dense} onChange={() => setDense(!dense)} label="Mode dense" />
          </div>
        </Card>
        <Card title="zone de danger" sub="ces actions sont irréversibles.">
          <Button kind="danger" icon="trash-2">Supprimer le compte</Button>
        </Card>
      </Frame>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>

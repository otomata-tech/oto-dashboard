<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oto — Serper</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
<link rel="stylesheet" href="../../../styles.css" />
<script src="../../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>html, body { margin: 0; height: 100%; background: var(--color-bg); } #root { height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="frame.jsx"></script>
<script type="text/babel">
  const { Card, Breadcrumb, Tabs, Tag, Stat, CopyField, Button, Dot, Table } = window.OtoConsoleDesignSystem_517927;
  const calls = [
    { t: "recherche_entreprises.search", n: 412, e: 0 },
    { t: "recherche_entreprises.get", n: 96, e: 1 },
  ];
  const cols = [
    { key: "d", label: "", width: 20, render: (r) => <Dot tone={r.e ? "terra" : "olive"} size={7} /> },
    { key: "t", label: "tool", mono: true },
    { key: "n", label: "calls", align: "right", render: (r) => r.n },
    { key: "e", label: "", align: "right", render: (r) => <Tag tone={r.e ? "terra" : "olive"}>{r.e} err</Tag> },
  ];
  function Page() {
    const [tab, setTab] = React.useState("overview");
    return (
      <Frame title="Serper" crumb="connectors" active="/connectors">
        <Breadcrumb items={[{label:"gérer mon org",href:"#"},{label:"connectors",href:"#"},{label:"Serper"}]} />
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>Serper</h2>
          <Tag tone="olive">live</Tag>
          <span style={{ marginLeft: "auto" }}><Button kind="mini" icon="refresh-cw">Rotation de clé</Button></span>
        </div>
        <Tabs value={tab} onChange={setTab} tabs={[{key:"overview",label:"aperçu"},{key:"usage",label:"usage"},{key:"settings",label:"réglages"}]} />
        {tab === "overview" ? (
          <React.Fragment>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14 }}>
              <Stat label="appels · 7j" value="412" sub="0 erreur" />
              <Stat label="quota" value="840" unit="/ 1000" sub="pool plateforme" />
              <Stat label="latence" value="120" unit="ms" sub="p50" />
            </div>
            <Card title="clé" sub="résolue côté serveur, jamais exposée au client."><CopyField value="SERPER_API_KEY = ••••••••••••••••" /></Card>
          </React.Fragment>
        ) : tab === "usage" ? (
          <Card title="appels récents" flush><Table columns={cols} rows={calls} /></Card>
        ) : (
          <Card title="réglages" sub="retirer ce connecteur le rend indisponible à tous les agents de l'org.">
            <Button kind="danger" icon="trash-2">Retirer le connecteur</Button>
          </Card>
        )}
      </Frame>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>

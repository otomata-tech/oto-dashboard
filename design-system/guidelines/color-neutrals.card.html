<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--color-ink); }
  .row { display: flex; gap: 0; padding: 18px 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 54px; border-top: 1px solid var(--color-hair); border-bottom: 1px solid var(--color-hair); }
  .sw:first-child .chip { border-left: 1px solid var(--color-hair); border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
  .sw:last-child .chip { border-right: 1px solid var(--color-hair); border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
  .n { font-family: var(--font-mono); font-size: 9.5px; color: var(--color-mute); margin-top: 7px; letter-spacing: 0.04em; }
  .h { font-family: var(--font-mono); font-size: 8.5px; color: var(--color-faint); }
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#fefcf5"></div><div class="n">bg / paper</div><div class="h">#fefcf5</div></div>
  <div class="sw"><div class="chip" style="background:#f4ecd2"></div><div class="n">paper-2</div><div class="h">#f4ecd2</div></div>
  <div class="sw"><div class="chip" style="background:#ebe1ba"></div><div class="n">paper-3</div><div class="h">#ebe1ba</div></div>
  <div class="sw"><div class="chip" style="background:#e9dcb4"></div><div class="n">hair</div><div class="h">#e9dcb4</div></div>
  <div class="sw"><div class="chip" style="background:#aa9f7e"></div><div class="n">faint</div><div class="h">#aa9f7e</div></div>
  <div class="sw"><div class="chip" style="background:#7a6c50"></div><div class="n">mute</div><div class="h">#7a6c50</div></div>
  <div class="sw"><div class="chip" style="background:#4a3a23"></div><div class="n">ink-soft</div><div class="h">#4a3a23</div></div>
  <div class="sw"><div class="chip" style="background:#2c2112"></div><div class="n">ink</div><div class="h">#2c2112</div></div>
</div>
</body></html>

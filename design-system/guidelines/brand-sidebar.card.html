<!-- @dsCard group="Colors" viewport="700x210" name="Dark sidebar surface" subtitle="The high-contrast ink anchor; active items fill saffron" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--color-ink); }
  .wrap { padding: 20px 22px; display: flex; gap: 24px; align-items: stretch; }
  .sb { width: 210px; background: var(--sidebar-bg); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 3px; box-shadow: var(--shadow-card); }
  .gl { font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sidebar-fg-mute); padding: 6px 8px 4px; }
  .it { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--sidebar-fg); }
  .it .dot { width: 15px; height: 15px; border-radius: 4px; background: var(--sidebar-fg-mute); opacity: .5; }
  .it.on { background: var(--sidebar-active-bg); color: var(--sidebar-active-fg); font-weight: 700; }
  .it.on .dot { background: var(--sidebar-active-fg); opacity: 1; }
  .toks { display: flex; flex-direction: column; gap: 9px; justify-content: center; }
  .tk { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 10.5px; color: var(--color-mute); }
  .sw { width: 20px; height: 20px; border-radius: 5px; border: 1px solid var(--color-hair); }
</style></head>
<body>
<div class="wrap">
  <div class="sb">
    <div class="it on"><span class="dot"></span>overview</div>
    <div class="it"><span class="dot"></span>connectors</div>
    <div class="gl">memory</div>
    <div class="it"><span class="dot"></span>données</div>
  </div>
  <div class="toks">
    <div class="tk"><span class="sw" style="background:#2c2112"></span>--sidebar-bg · #2c2112</div>
    <div class="tk"><span class="sw" style="background:#e4d7ba"></span>--sidebar-fg · #e4d7ba</div>
    <div class="tk"><span class="sw" style="background:#a99a75"></span>--sidebar-fg-mute · #a99a75</div>
    <div class="tk"><span class="sw" style="background:#f0b41e"></span>--sidebar-active-bg · saffron</div>
  </div>
</div>
</body></html>

<!-- @dsCard group="Type" viewport="700x200" name="Spline Sans Mono — the technical voice" subtitle="Uppercase, tracked; labels, eyebrows, codes, counts" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-mono); color: var(--color-ink); }
  .wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .spec { font-size: 8.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-faint); width: 120px; flex-shrink: 0; }
  .eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-mute); }
  .label { font-size: 9.5px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-faint); }
  .code { font-size: 11.5px; color: var(--color-ink); }
  .count { font-size: 10px; color: var(--color-faint); }
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="spec">eyebrow · 0.16em</span><span class="eyebrow">studio open · all systems nominal</span></div>
  <div class="row"><span class="spec">group label · 0.18em</span><span class="label">workspace</span></div>
  <div class="row"><span class="spec">code · cell</span><span class="code">recherche_entreprises.search</span></div>
  <div class="row"><span class="spec">count</span><span class="count">1,204 calls</span></div>
</div>
</body></html>

<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation — hairline + warm shadow" subtitle="Cards float on cream; almost no depth otherwise" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--color-ink); }
  .row { display: flex; gap: 24px; padding: 26px 24px; align-items: center; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 150px; height: 66px; background: var(--color-surface); border: 1px solid var(--color-card-bd); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 9.5px; color: var(--color-faint); letter-spacing: 0.1em; }
  .card { box-shadow: var(--shadow-card); }
  .pop { box-shadow: var(--shadow-pop); }
  .n { font-family: var(--font-mono); font-size: 9.5px; color: var(--color-mute); letter-spacing: 0.06em; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box">hairline only</div><div class="n">--shadow-xs</div></div>
  <div class="item"><div class="box card">resting card</div><div class="n">--shadow-card</div></div>
  <div class="item"><div class="box pop">menu · dialog</div><div class="n">--shadow-pop</div></div>
</div>
</body></html>

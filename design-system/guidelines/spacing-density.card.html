<!-- @dsCard group="Spacing" viewport="700x160" name="Density & rhythm" subtitle="Card padding, row height, stack gap — plus dense mode" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--color-ink); }
  .wrap { padding: 20px 22px; display: flex; gap: 16px; align-items: stretch; }
  .demo { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card { background: var(--color-surface); border: 1px solid var(--color-hair); border-radius: 12px; padding: 18px; }
  .card.dense { padding: 13px; }
  .bar { height: 9px; background: var(--color-paper-2); border-radius: 4px; }
  .bar.short { width: 55%; }
  .cap { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-faint); }
  .tokens { display: flex; flex-direction: column; gap: 6px; justify-content: center; }
  .tk { font-family: var(--font-mono); font-size: 10px; color: var(--color-mute); }
  .tk b { color: var(--color-ink); font-weight: 600; }
</style></head>
<body>
<div class="wrap">
  <div class="demo">
    <span class="cap">default · pad 18</span>
    <div class="card"><div class="bar short" style="margin-bottom:10px"></div><div class="bar"></div></div>
  </div>
  <div class="demo">
    <span class="cap">dense · pad 13</span>
    <div class="card dense"><div class="bar short" style="margin-bottom:7px"></div><div class="bar"></div></div>
  </div>
  <div class="tokens">
    <div class="tk"><b>--pad-card</b> 18 → 13</div>
    <div class="tk"><b>--row-py</b> 9 → 6</div>
    <div class="tk"><b>--gap-stack</b> 16</div>
    <div class="tk"><b>--sb-w</b> 232</div>
    <div class="tk"><b>--fs-body</b> 13.5 → 12.5</div>
  </div>
</div>
</body></html>

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Deploy via rsync
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          echo "$SSH_DEPLOY_KEY" > /tmp/key && chmod 600 /tmp/key
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -i /tmp/key" frontend/dist/ root@REDACTED_IP:/opt/oto-dashboard/dist/

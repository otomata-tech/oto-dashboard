name: CI/CD

# test → deploy : le deploy DÉPEND d'un build/type-check vert (`needs: test`). Le job
# `test` (build + vue-tsc) tourne aussi sur PR (= required check de branch protection).
# Le déploiement est build-SERVEUR : la clé CI est épinglée en forced-command
# (command="/opt/deploy/oto-dashboard.sh") côté otomata-0 — le job `deploy` ne fait que
# déclencher ce script (git reset + npm build + snapshot + swap + smoke + rollback).
# Pour changer le déploiement : éditer /opt/deploy/oto-dashboard.sh sur le serveur.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build + type-check
        run: cd frontend && npm run build

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dashboard
      cancel-in-progress: false
    steps:
      - name: Trigger server-side deploy (clé restreinte → /opt/deploy/oto-dashboard.sh)
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "$SSH_DEPLOY_KEY" > /tmp/key && chmod 600 /tmp/key
          ssh -o StrictHostKeyChecking=no -i /tmp/key "root@$DEPLOY_HOST" true
          rm /tmp/key

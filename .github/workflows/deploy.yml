name: Deploy prod

# Modèle de release (ADR 0020, refonte 2026-07-20) : un TAG `v*` → PROD.
# main = tronc/preprod (deploy-canari.yml) ; la prod est un acte explicite = poser un
# tag `vX.Y.Z` (`git tag vX.Y.Z && git push origin vX.Y.Z`). Build artefact au tag
# (runner HOSTED, env VITE prod = défauts commités) → deploy artefact (runner
# SELF-HOSTED otomata-0, /opt/deploy/oto-dashboard-deploy.sh : copie atomique + smoke
# + rollback). test/build → deploy (`needs: test`). Cf. ADR 0020.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag à déployer en prod (ex: v1.2.3)"
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEPLOY_REF: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      # Valide le format du tag AVANT tout usage (anti-injection : le ref/input
      # atterrit ensuite dans un `ref:` de checkout et une commande shell).
      - name: Validate tag format
        run: |
          case "$DEPLOY_REF" in
            v[0-9]*) echo "tag ok: $DEPLOY_REF" ;;
            *) echo "tag invalide (attendu vX.Y.Z): $DEPLOY_REF" >&2; exit 1 ;;
          esac
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build + type-check (env VITE prod = défauts commités)
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: cd frontend && npm run build
      - name: Unit tests (vitest)
        run: cd frontend && npm run test
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 3
          if-no-files-found: error

  deploy:
    needs: test
    runs-on: [self-hosted, otomata-0]
    concurrency:
      group: deploy-dashboard
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: ${{ runner.temp }}/dist
      - name: Deploy prod (artefact only, script root-restreint)
        run: sudo /opt/deploy/oto-dashboard-deploy.sh "${{ runner.temp }}/dist"

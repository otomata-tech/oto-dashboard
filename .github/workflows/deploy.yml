name: CI/CD

# test → deploy : le deploy DÉPEND d'un build/type-check vert (`needs: test`). Avant,
# Deploy et CI tournaient en parallèle sur push main → un type-error déployait quand
# même. Le job `test` (build + vue-tsc) tourne aussi sur PR (= required check de
# branch protection) et uploade le dist ; `deploy` le télécharge et rsync (build une
# seule fois). Cf. otomata-private#39 (revue CI/CD).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build + type-check
        run: cd frontend && npm run build
      - name: Upload dist
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dashboard
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Deploy via rsync (+ snapshot, smoke, rollback)
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -e
          echo "$SSH_DEPLOY_KEY" > /tmp/key && chmod 600 /tmp/key
          RSH="ssh -o StrictHostKeyChecking=no -i /tmp/key"
          BOX="root@$DEPLOY_HOST"; D=/opt/oto-dashboard
          # #4 snapshot du dist courant pour rollback
          $RSH "$BOX" "rm -rf $D/dist.prev; cp -a $D/dist $D/dist.prev 2>/dev/null || true"
          # déploiement
          rsync -avz --delete -e "$RSH" dist/ "$BOX:$D/dist/"
          # #3 smoke (200, retry ~15s) → #4 restore si KO
          $RSH "$BOX" '
            for i in 1 2 3 4 5; do curl -fsS --max-time 10 https://dashboard.oto.ninja/ -o /dev/null 2>/dev/null && exit 0; sleep 3; done
            echo "SMOKE KO → rollback dist.prev"; rm -rf '"$D"'/dist; mv '"$D"'/dist.prev '"$D"'/dist; exit 1
          '

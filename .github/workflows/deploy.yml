name: CI/CD

# test (build + type-check + vitest, runner HOSTED) → deploy (runner SELF-HOSTED).
# Depuis le 2026-07-02 : plus AUCUN build sur la box — le dist du job `test` EST
# l'artefact déployé (upload-artifact → download → /opt/deploy/oto-dashboard-deploy.sh,
# copie atomique + smoke + rollback, chemin borné au workspace runner). Le runner
# self-hosted ne subsiste que parce que CrowdSec droppe le SSH entrant des IPs
# cloud : il copie des fichiers, rien d'autre. L'ex-script build-serveur
# /opt/deploy/oto-dashboard.sh reste en secours manuel.
# SENTRY_AUTH_TOKEN (upload des source maps au build) = GitHub Secret ; absent
# (PRs de forks) → build sans source maps, dégradé gracieux.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build + type-check
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: cd frontend && npm run build
      - name: Unit tests (vitest)
        run: cd frontend && npm run test
      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: dist
          path: frontend/dist
          retention-days: 3
          if-no-files-found: error

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, otomata-0]
    concurrency:
      group: deploy-dashboard
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: ${{ runner.temp }}/dist
      - name: Deploy (artefact only, script root-restreint)
        run: sudo /opt/deploy/oto-dashboard-deploy.sh "${{ runner.temp }}/dist"

name: CI/CD

# test → deploy : le deploy DÉPEND d'un build/type-check vert (`needs: test`). Le job
# `test` (build + vue-tsc) tourne sur runner hosted GitHub, aussi sur PR (= required
# check de branch protection).
# Le job `deploy` tourne sur un RUNNER SELF-HOSTED installé sur otomata-0 (label
# `otomata-0`, user non-root `gha-runner`) : pas de SSH entrant depuis Internet (le
# port 22 est filtré par CrowdSec et droppait les IP des runners GitHub hosted). Le
# runner n'a qu'un sudo NOPASSWD sur /opt/deploy/oto-dashboard.sh (moindre privilège,
# équivalent de l'ancien forced-command) → il ne peut QUE déclencher ce script
# (git reset + npm build + snapshot + swap + smoke + rollback).
# Pour changer le déploiement : éditer /opt/deploy/oto-dashboard.sh sur le serveur.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build + type-check
        run: cd frontend && npm run build

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, otomata-0]
    concurrency:
      group: deploy-dashboard
      cancel-in-progress: false
    steps:
      - name: Deploy (build serveur via script root-restreint)
        run: sudo /opt/deploy/oto-dashboard.sh

name: guard-main
# Empêche la divergence main/canari : toute PR vers `main` doit apporter un contenu
# DÉJÀ présent sur `canari` (donc déjà passé par la preprod). Bloque les PR
# feature→main directes ; la seule voie vers main est une promotion canari→main.
on:
  pull_request:
    branches: [main]
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Le contenu de la PR doit déjà être sur canari
        run: |
          git fetch origin canari
          if git merge-base --is-ancestor "${{ github.event.pull_request.head.sha }}" origin/canari; then
            echo "OK — ce commit est sur canari (passé par preprod)."
          else
            echo "::error::Ce commit n'est pas sur canari. Passe par canari d'abord — pas de PR feature→main directe (promotion canari→main uniquement)."
            exit 1
          fi

name: CI

# Gate de PR (required check `test` en branch protection). Le dashboard n'a pas de
# tests unitaires → la barrière = le build, qui inclut le type-check (vue-tsc via
# `npm run build` = run-p type-check + build-only). Un type-error casse le merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build + type-check
        run: cd frontend && npm run build
